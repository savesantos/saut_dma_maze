algos: [vi, sarsa, qlearning]
mazes:
  - fixture_3x3
  - fixture_5x5_corridor
  - fixture_7x7_loop
seeds: [0, 1, 2, 3, 4]
mdp_config:
  gamma: 0.99
  slip_prob: 0.1
td_config:
  n_episodes: 2000
  alpha0: 0.1
  alpha_min: 0.001
  alpha_tau: 50.0
  epsilon0: 1.0
  epsilon_min: 0.05
  epsilon_anneal_frac: 0.5
# Per-maze overrides merged on top of td_config. Sized roughly as
# k * |S| * |A| / (1 - gamma) with k ~ 8, gamma = 0.99 (see
# docs/mdp_design.md §7).
td_config_overrides:
  fixture_3x3:
    n_episodes: 1000
  fixture_5x5_corridor:
    n_episodes: 5000
  fixture_7x7_loop:
    # Bumped from 30k -> 80k and ε annealed over 80% (vs 50%) of the
    # schedule: SARSA's on-policy bootstrap was still drifting at 30k
    # on this maze (V*-Vπ ≈ 24, success 0.75). See
    # data/archive/reward10/README.md for the diagnosis.
    n_episodes: 80000
    epsilon_anneal_frac: 0.8
out: data
