# Map ArUco marker IDs to the maze cells they are physically affixed to.
# row, col are 0-indexed in the same convention as the MazeGrid msg.
# reference_yaw_rad is optional (null = use detected yaw directly).
markers:
  - {id: 0, row: 0, col: 0, reference_yaw_rad: 0.0}
  - {id: 1, row: 0, col: 4, reference_yaw_rad: 0.0}
  - {id: 2, row: 4, col: 0, reference_yaw_rad: 0.0}
  - {id: 3, row: 4, col: 4, reference_yaw_rad: 0.0}
